# docker image scanning using trivy
name: docker image scan
on:
    workflow_call:
jobs:
    image-scan:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4

            - name: docker lgin
              uses: docker/login-action@v3
              with:
                username: ${{secrets.DOCKERHUB_USER}}
                password: ${{secrets.DOCKERHUB_TOKEN}}
# using exit code 0
# can also use .trivyignore to ignore 
# can also use .trivyignore to ignore CVEs but not using because there are lots of CVEs
            - name: image scan using trivy
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: ${{secrets.DOCKERHUB_USER}}/petclinic:${{ github.sha }}
                format: table
                severity: "CRITICAL,HIGH"
                exit-code: "0"
                
