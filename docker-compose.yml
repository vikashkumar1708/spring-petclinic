services:
  postgres:
    image: postgres:17
    container_name: postgres
    environment: 
      POSTGRES_USER: petclinic
      POSTGRES_PASSWORD: petclinic
      POSTGRES_DB: petclinicdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports: 
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - petclinic-network

  petclinic:
    build: .
    container_name: petclinic
    ports:
      - "80:8080"
    environment:
      POSTGRES_DB: petclinicdb
      POSTGRES_PASSWORD: petclinic
      POSTGRES_USER: petclinic
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petclinic-network

networks:
  petclinic-network:
    driver: bridge

volumes:
  postgres-data:
   